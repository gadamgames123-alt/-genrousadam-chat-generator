<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SAMP Chatlog Gen v2.8 - Auto Save Edition</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1e1e2f; color: #fff; margin: 0; padding: 20px; display: flex; gap: 20px; }
        .controls { flex: 1; background: #2a2a40; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); overflow-y: auto; max-height: 90vh; }
        .preview-area { flex: 1.5; display: flex; flex-direction: column; align-items: center; position: relative; }
        h2 { margin-top: 0; color: #ffb86c; font-size: 1.1rem; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .setting-group { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        label { font-weight: bold; min-width: 100px; font-size: 0.85rem; }
        input, select, button { padding: 8px; border-radius: 5px; border: 1px solid #444; background: #333; color: #fff; }
        button { background: #50fa7b; color: #000; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .line-item { background: #1e1e2f; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-right: 4px solid #ffb86c; }
        .line-controls { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
        .line-input { width: 100%; box-sizing: border-box; padding: 8px; background: #252535; border: 1px solid #444; color: #fff; }
        #canvasWrapper { border: 2px dashed #6272a4; position: relative; background: #000; }
        canvas { display: block; }
        .bold-btn { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 1px solid #444; background: #333; border-radius: 5px; }
        .bold-btn.active { background: #ffb86c; color: #000; }
        .line-handle { cursor: move; color: #ffb86c; font-weight: bold; padding: 5px; background: #333; border-radius: 3px; font-size: 12px; }
        .group-actions { margin-bottom: 15px; background: #383850; padding: 10px; border-radius: 8px; display: flex; gap: 10px; }
        .color-label { font-size: 10px; display: block; margin-bottom: 2px; color: #aaa; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>الإعدادات العامة</h2>
        <div class="setting-group">
            <label>صورة اللعبة:</label>
            <input type="file" id="bgImageInput" accept="image/*">
        </div>
        <div class="setting-group">
            <label>نوع الخط:</label>
            <select id="fontFamily" onchange="generateImage(); saveSettings();">
                <option value="Tahoma">Tahoma</option>
                <option value="Arial">Arial</option>
                <option value="Courier New">Courier New</option>
                <option value="Verdana">Verdana</option>
                <option value="Georgia">Georgia</option>
                <option value="Lucida Console">Lucida Console</option>
            </select>
        </div>
        <div class="setting-group">
            <label>حجم الخط:</label>
            <input type="number" id="fontSize" value="18" style="width: 60px;" oninput="onFontSizeChange()">
            <label>شفافية الخلفيات:</label>
            <input type="range" id="bgOpacity" min="0" max="1" step="0.1" value="0.7" oninput="generateImage(); saveSettings();">
        </div>

        <div class="group-actions">
            <button onclick="stackSelected()" style="background: #bd93f9;">إعادة رصّ الأسطر (بدون فراغ)</button>
            <button onclick="toggleSelectAll()" style="background: #6272a4;">تحديد الكل</button>
        </div>

        <h2>الأسطر</h2>
        <div id="linesContainer"></div>
        <button onclick="addLine()" style="width: 100%; margin-top: 10px;">+ سطر جديد</button>
        <button onclick="downloadImage()" style="width: 100%; padding: 15px; margin-top: 20px; font-size: 1.1rem; background: #ff79c6;">تحميل الصورة النهائية</button>
    </div>

    <div class="preview-area">
        <h2 style="color: #8be9fd;">المعاينة (اسحب ☰ لتحريك المجموعة)</h2>
        <div id="canvasWrapper">
            <canvas id="chatCanvas"></canvas>
        </div>
    </div>

<script>
    const canvas = document.getElementById('chatCanvas');
    const ctx = canvas.getContext('2d');
    const linesContainer = document.getElementById('linesContainer');
    const bgImageInput = document.getElementById('bgImageInput');
    
    let lineCount = 0;
    let bgImage = null;
    let draggingLineId = null;
    let dragStartX, dragStartY;
    let initialPositions = {};

    function addLine(text = "", color = "#ffffff", isBold = true, x = 30, y = 30, bgType = "fit", bgColor = "#000000") {
        const id = lineCount++;
        const div = document.createElement('div');
        div.className = 'line-item';
        div.id = `line-${id}`;
        div.dataset.x = x;
        div.dataset.y = y;
        
        div.innerHTML = `
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
                <input type="checkbox" class="select-box" checked>
                <input type="text" class="line-input" value="${text}" oninput="generateImage()">
                <span class="line-handle" onmousedown="startDrag(event, ${id})">☰</span>
            </div>
            <div class="line-controls">
                <div>
                    <span class="color-label">نص</span>
                    <select class="line-color" onchange="generateImage()">
                        <option value="#ffffff" ${color === '#ffffff' ? 'selected' : ''}>أبيض</option>
                        <option value="#C2A2DA" ${color === '#C2A2DA' ? 'selected' : ''}>بنفسجي</option>
                        <option value="#ffff00" ${color === '#ffff00' ? 'selected' : ''}>أصفر</option>
                        <option value="#ff0000">أحمر</option>
                    </select>
                </div>
                <div>
                    <span class="color-label">خلفية</span>
                    <select class="line-bg-type" onchange="generateImage()">
                        <option value="fit" ${bgType === 'fit' ? 'selected' : ''}>Fit</option>
                        <option value="fill" ${bgType === 'fill' ? 'selected' : ''}>Fill</option>
                        <option value="none" ${bgType === 'none' ? 'selected' : ''}>None</option>
                    </select>
                </div>
                <div>
                    <span class="color-label">لونها</span>
                    <input type="color" class="line-bg-color" value="${bgColor}" oninput="generateImage()">
                </div>
                <div class="bold-btn ${isBold ? 'active' : ''}" onclick="toggleBold(this)" style="margin-top:12px">B</div>
                <button onclick="removeLine(${id})" style="background:#ff5555; margin-top:12px">X</button>
            </div>
        `;
        linesContainer.appendChild(div);
        generateImage();
    }

    function toggleBold(btn) { btn.classList.toggle('active'); generateImage(); }
    function removeLine(id) { document.getElementById(`line-${id}`).remove(); generateImage(); }
    function toggleSelectAll() {
        const boxes = document.querySelectorAll('.select-box');
        const anyUnchecked = Array.from(boxes).some(b => !b.checked);
        boxes.forEach(b => b.checked = anyUnchecked);
    }

    function onFontSizeChange() { 
        stackSelected(); 
        generateImage();
        saveSettings(); // حفظ عند تغيير حجم الخط
    }

    function stackSelected() {
        const selectedLines = Array.from(document.querySelectorAll('.line-item')).filter(li => li.querySelector('.select-box').checked);
        if (selectedLines.length < 1) return;
        const fontSize = parseInt(document.getElementById('fontSize').value);
        const textPadding = 4;
        const lineHeight = fontSize + (textPadding * 2);
        let startX = parseInt(selectedLines[0].dataset.x);
        let startY = parseInt(selectedLines[0].dataset.y);
        selectedLines.forEach((line, index) => {
            line.dataset.x = startX;
            line.dataset.y = startY + (index * (lineHeight - 0.4));
        });
        generateImage();
    }

    function startDrag(e, id) {
        e.preventDefault();
        draggingLineId = id; dragStartX = e.clientX; dragStartY = e.clientY;
        initialPositions = {};
        document.querySelectorAll('.line-item').forEach(li => {
            if (li.querySelector('.select-box').checked) {
                initialPositions[li.id] = { x: parseInt(li.dataset.x), y: parseInt(li.dataset.y) };
            }
        });
        document.addEventListener('mousemove', onDragMove);
        document.addEventListener('mouseup', onDragEnd);
    }

    function onDragMove(e) {
        if (draggingLineId === null) return;
        const dx = e.clientX - dragStartX; const dy = e.clientY - dragStartY;
        for (let id in initialPositions) {
            const line = document.getElementById(id);
            line.dataset.x = initialPositions[id].x + dx;
            line.dataset.y = initialPositions[id].y + dy;
        }
        generateImage();
    }

    function onDragEnd() { draggingLineId = null; document.removeEventListener('mousemove', onDragMove); document.removeEventListener('mouseup', onDragEnd); }

    function hexToRgba(hex, opacity) {
        let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${opacity})`;
    }

    function generateImage() {
        const fontSize = parseInt(document.getElementById('fontSize').value);
        const fontFam = document.getElementById('fontFamily').value;
        const globalOpacity = parseFloat(document.getElementById('bgOpacity').value);
        const textPadding = 4;
        const lineHeight = fontSize + (textPadding * 2);

        if (bgImage) {
            canvas.width = bgImage.width; canvas.height = bgImage.height;
            ctx.drawImage(bgImage, 0, 0);
        } else {
            canvas.width = 800; canvas.height = 450;
            ctx.fillStyle = "#111"; ctx.fillRect(0,0,800,450);
        }

        ctx.direction = "ltr"; ctx.textAlign = "left"; ctx.textBaseline = "top";

        document.querySelectorAll('.line-item').forEach(line => {
            const text = line.querySelector('.line-input').value;
            if (!text) return;

            const color = line.querySelector('.line-color').value;
            const bgType = line.querySelector('.line-bg-type').value;
            const bgColorHex = line.querySelector('.line-bg-color').value;
            const isBold = line.querySelector('.bold-btn').classList.contains('active');
            const x = parseInt(line.dataset.x);
            const y = parseInt(line.dataset.y);

            ctx.font = `${isBold ? 'bold' : 'normal'} ${fontSize}px ${fontFam}`;
            const textWidth = ctx.measureText(text).width;

            if (bgType !== "none") {
                ctx.fillStyle = hexToRgba(bgColorHex, globalOpacity);
                if (bgType === "fit") {
                    ctx.fillRect(x - textPadding, y - textPadding, textWidth + (textPadding * 2), lineHeight);
                } else if (bgType === "fill") {
                    ctx.fillRect(0, y - textPadding, canvas.width, lineHeight);
                }
            }

            ctx.strokeStyle = "black";
            ctx.lineWidth = 2;
            ctx.strokeText(text, x, y);
            ctx.fillStyle = color;
            ctx.fillText(text, x, y);
        });
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'SAMP_RP_Final.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    bgImageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (re) => {
                const img = new Image();
                img.onload = () => { bgImage = img; generateImage(); };
                img.src = re.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    // --- نظام الحفظ والاستعادة ---
    function saveSettings() {
        const settings = {
            fontSize: document.getElementById('fontSize').value,
            fontFamily: document.getElementById('fontFamily').value,
            bgOpacity: document.getElementById('bgOpacity').value
        };
        localStorage.setItem('sampGeneratorSettings', JSON.stringify(settings));
    }

    function loadSettings() {
        const saved = localStorage.getItem('sampGeneratorSettings');
        if (saved) {
            const settings = JSON.parse(saved);
            document.getElementById('fontSize').value = settings.fontSize;
            document.getElementById('fontFamily').value = settings.fontFamily;
            document.getElementById('bgOpacity').value = settings.bgOpacity;
            generateImage();
        }
    }

    window.onload = () => {
        loadSettings(); // استعادة الإعدادات فور فتح الصفحة
        addLine("By generousadam!", "#ffffff", false, 60, 60, "fit", "#000000");
        addLine("* تحياتي.", "#C2A2DA", true, 60, 86, "fit", "#000000");
    };
</script>
</body>
</html>
